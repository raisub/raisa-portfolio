<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --cream: #F2EDE6; --dark: #1A1714; --terra: #B5603A; --warm-gray: #8A8178; --serif: "Playfair Display", Georgia, serif; --sans: "DM Sans", sans-serif; --mono: "DM Mono", monospace; }

  nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; padding: 1.25rem 2.5rem; background: rgba(242,237,230,0.92); backdrop-filter: blur(12px); border-bottom: 0.5px solid rgba(26,23,20,0.1); }

  .nav-back { font-family: var(--mono); font-size: 0.7rem; letter-spacing: 0.08em; color: var(--terra); text-decoration: none; border: 1.5px solid var(--terra); padding: 0.5rem 1.25rem; border-radius: 999px; transition: all 0.25s; }
  .nav-back:hover { background: var(--terra); color: white; }
  .hero { padding: 8rem 2.5rem 3rem; }

  .subtitle { font-size: 1rem; color: var(--warm-gray); font-weight: 300; }
  .gallery { padding: 2rem 2.5rem 6rem; display: flex; flex-direction: column; gap: 1.5rem; }
  .g-img { width: 100%; display: block; border-radius: 4px; object-fit: cover; }
  .g-two { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
  .g-three { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1.5rem; }
  .g-label { font-family: var(--mono); font-size: 0.6rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--warm-gray); margin-top: -0.25rem; }
  video { width: 100%; border-radius: 4px; background: #000; display: block; }
  @media (max-width: 680px) {
    nav { padding: 1rem 1.25rem; }
    .hero { padding: 6rem 1.25rem 2rem; }

  }
</style>
